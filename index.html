<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { background-color: #4F46E5 !important; color: white !important; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="login-page" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-md w-96 text-center">
            <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="Logo" class="w-16 mx-auto mb-4">
            <h2 class="text-2xl font-bold mb-1">GitHub Issues Tracker</h2>
            <p class="text-gray-500 mb-6 text-sm">Sign in to manage your issues</p>
            
            <input type="text" id="username" placeholder="Enter Username" class="w-full p-2 border rounded mb-2 outline-none">
            <p class="text-xs text-left text-purple-600 mb-4 font-semibold">Default: admin</p>
            
            <input type="password" id="password" placeholder="Enter Password" class="w-full p-2 border rounded mb-2 outline-none">
            <p class="text-xs text-left text-purple-600 mb-6 font-semibold">Default: admin123</p>
            
            <button onclick="handleLogin()" class="w-full bg-indigo-600 text-white py-2 rounded font-semibold hover:bg-indigo-700 transition">Sign In</button>
            
            <div class="my-4 flex items-center">
                <div class="flex-grow border-t border-gray-300"></div>
                <span class="mx-4 text-gray-400 text-sm">OR</span>
                <div class="flex-grow border-t border-gray-300"></div>
            </div>

            <div class="p-4 bg-gray-50 rounded text-sm text-center">
                <p class="text-gray-500 mb-2">Demo Credentials:</p>
                <p class="font-bold text-gray-700">Username: <span class="font-normal text-gray-600">admin</span></p>
                <p class="font-bold text-gray-700">Password: <span class="font-normal text-gray-600">admin123</span></p>
            </div>
        </div>
    </div>

    <div id="main-page" class="hidden">
        <nav class="bg-white shadow-sm p-4 flex flex-col md:flex-row justify-between items-center px-4 md:px-10 gap-4">
            <div class="flex items-center gap-2">
                <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="Logo" class="w-8">
                <span class="font-bold text-xl text-gray-800">GitHub Issues Tracker</span>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <input type="text" id="search-input" placeholder="Search issues..." class="border p-2 rounded w-full md:w-64 outline-none bg-gray-50 focus:bg-white">
                <button onclick="handleSearch()" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700 transition">Search</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto mt-6 md:mt-10 p-4">
            <div class="flex gap-2 md:gap-4 mb-6 pb-4">
                <button onclick="filterIssues('all')" id="tab-all" class="px-6 py-2 rounded border bg-white active-tab font-semibold shadow-sm">All</button>
                <button onclick="filterIssues('open')" id="tab-open" class="px-6 py-2 rounded border bg-white font-semibold text-gray-600 hover:bg-gray-50 shadow-sm">Open</button>
                <button onclick="filterIssues('closed')" id="tab-closed" class="px-6 py-2 rounded border bg-white font-semibold text-gray-600 hover:bg-gray-50 shadow-sm">Closed</button>
            </div>
</body>
</html>
